services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hitalent
      POSTGRES_USER: hitalent
      POSTGRES_PASSWORD: 1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: postgres://hitalent:1@db:5432/hitalent?sslmode=disable
    command: ["goose", "-dir", "/app/migrations", "postgres", "postgres://hitalent:1@db:5432/hitalent?sslmode=disable", "up"]
    restart: "no"

  app:
    build:
      context: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      HTTP_ADDR: :8080
      DB_URL: postgres://hitalent:1@db:5432/hitalent?sslmode=disable
      GORM_LOG_LEVEL: warn
    ports:
      - "8080:8080"

volumes:
  postgres_data: